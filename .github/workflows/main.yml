name: Build My Word APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip build-essential libssl-dev libffi-dev \
            libsqlite3-dev python3-dev autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev cmake libltdl-dev patch

      - name: Install buildozer and dependencies
        run: |
          pip install --upgrade pip
          pip install "cython==0.29.37" "buildozer==1.5.0"

      - name: Pre-install Android SDK and NDK
        run: |
          buildozer android debug 2>&1 | tail -5 || true
        env:
          GRADLE_OPTS: "-Xmx2048m -Dorg.gradle.daemon=false"

      - name: Build debug APK
        run: |
          buildozer -v android debug
        env:
          GRADLE_OPTS: "-Xmx2048m -Dorg.gradle.daemon=false"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyWord-debug-apk
          path: bin/*.apk
          retention-days: 30
